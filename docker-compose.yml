services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eventsense_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventsense_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-eventsense_ai}
    ports:
      - "5433:5432"
    volumes:
      - eventsense_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eventsense_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.seed"]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventsense_api
    env_file:
      - .env
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      # Sample tenant documents read by `app.seed_demo` (read-only). They live
      # outside ./backend, so mount them in explicitly.
      - ./data/tenant-documents:/app/data/tenant-documents:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "${API_HOST:-0.0.0.0}",
        "--port",
        "${API_PORT:-8000}",
        "--reload"
      ]

volumes:
  eventsense_postgres_data:
